<!DOCTYPE html>
<html lang="{{ g.lang }}" dir="{{ 'rtl' if g.lang == 'he' else 'ltr' }}">
<head>
    <title>Invoice Tool</title>
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff; /* White background for the table */
            padding: 10px; /* Padding around the table */
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        h1, h2, h3 {
            color: #333;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        /* RTL styles */
        .rtl {
            direction: rtl;
            text-align: right;
        }
        /* Section styles */
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .section h2 {
            margin-top: 0;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="{{ 'rtl' if g.lang == 'he' else '' }}">
    <h1>{{ _('Welcome to Your Invoice Tool!') }}</h1>

    <!-- Client Section -->
    <div class="section">
        <h2>{{ _('Clients') }}</h2>
        {% include 'client_section.html' %}
    </div>

    <!-- Orders Section -->
    <div class="section">
        <h2>{{ _('Orders') }}</h2>
        {% include 'order_add.html' %}
    </div>


</body>
</html>
